# scripts.example.yaml
# ------------------------------------------------------------------
# Scripts Configuration for yaml-run
# ------------------------------------------------------------------
# Run tasks using: yaml-run <task_name>
#
# The tool automatically loads 'vars.yaml' from the current directory
# and injects variables using {{variable.name}} syntax.

scripts:
  # =================================================================
  # 1. Basic String Commands
  # =================================================================
  # Any simple string is treated as a command.
  # Variable placeholders {{...}} are replaced before execution.
  clean: "npm:rimraf {{paths.dist}}"

  # =================================================================
  # 2. Sequential Execution (Series)
  # =================================================================
  # Use a YAML list (array) to run commands one after another.
  # If any command fails (exit code != 0), the sequence stops.
  build:
    - clean                       # References the 'clean' task above
    - "path: tsc {{commands.build_flags}}"

  # Explicit 'series' object syntax (Functionally identical to the list above)
  # Useful if you prefer explicit labeling.
  build:explicit:
    series:
      - clean
      - "path: tsc"

  # =================================================================
  # 3. Parallel Execution
  # =================================================================
  # Use the 'parallel' key to run tasks simultaneously.
  lint:
    parallel:
      - "path: eslint {{paths.src}}/**"
      - "path: stylelint {{paths.src}}/**/*.css"

  # =================================================================
  # 4. Combinations
  # =================================================================
  # You can mix series and parallel execution.
  deploy:
    series:
      - build                     # Run build (series)
      - lint                      # Run lint (parallel)
      - "cross-shell: echo Deploying {{project.name}}..."

  # =================================================================
  # 5. IMPORTANT: Explicit Command Tags
  # =================================================================
  # The runner now uses explicit prefixes instead of an ambiguous shell fallback.
  #
  # Use `path:` for executables that should be launched directly from PATH.
  #
  # Use `cmd:`, `powershell:`, `pwsh:`, or `bash:` when shell syntax is required.
  # Use `cross-shell:` when the command should run through the OS-appropriate shell.
  #
  # Validation will warn if a command is shell-specific on the current platform
  # or if a shell wrapper could be replaced by a portable alternative.

  # Example: Platform-specific shell commands
  # -------------------------------------

  # Windows shell examples
  cmd-example: "cmd: dir"
  powershell-example: "powershell: Get-ChildItem"
  pwsh-example: "pwsh: Get-ChildItem"

  # Unix shell example
  bash-example: "bash: rm -rf ./dist"

  # Direct PATH execution example
  path-example: "path: deno run --allow-read ./script.mjs"

  # Interactive foreground example
  # --------------------------------
  # This works because yaml-run recognizes the object shape, reads `cmd`,
  # and then applies `interactive: true` to inherit stdin for that step.
  # That lets the child process read Enter/Ctrl+C from the terminal.
  dev-apache-server:
    cmd: "workspace: apache-cli start --output --document-root ./{{paths.web_root}} --port 8080"
    interactive: true

  # This does not work because `workspace:` is just a string command prefix.
  # yaml-run only reads `interactive` from task objects that use `cmd` or `script`,
  # so putting `interactive: true` beside a `workspace:` string is not a supported task shape.
  # dev-apache-server:
  #   workspace: "apache-cli start --output --document-root ./{{paths.web_root}} --port 8080"
  #   interactive: true

  # Shell operator example that still resolves an internal task first
  usage-pass: "cross-shell: yaml-run clean && echo done"

